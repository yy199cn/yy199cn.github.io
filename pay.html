<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>支付宝支付</title>
<style>
body{background:#f5f5f5;font-family:微软雅黑}
.pay{max-width:400px;margin:50px auto;background:#fff;padding:30px;border-radius:12px;text-align:center}
button{width:100%;height:48px;background:#007AFF;color:#fff;border:none;border-radius:8px;font-size:16px;margin-top:20px}
</style>
</head>
<body>
<div class="pay">
  <h2>支付宝支付 0.01 元</h2>
  <button id="pay">立即支付</button>
</div>

<script>
const btn = document.getElementById('pay');
btn.onclick = async () => {
  btn.disabled = true;
  btn.innerText = "跳转中...";
  try {
    const r = await fetch("https://alipay-poclilidbpd.cn-hangzhou.fcapp.run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: "{}"
    });
    const d = await r.json();
    if (d.payUrl) location.href = d.payUrl;
  } catch (e) {
    alert("支付失败");
  } finally {
    btn.disabled = false;
    btn.innerText = "立即支付";
  }
};
</script>
</body>
</html>
