<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>支付测试 - yy199.cn</title>
<style>
  body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
  .pay-box { border: 1px solid #eee; padding: 20px; border-radius: 8px; text-align: center; }
  button { padding: 12px 30px; background: #1677ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
  button:hover { background: #4096ff; }
</style>
</head>
<body>
<div class="pay-box">
  <h3>支付 0.01 元测试</h3>
  <p>点击下方按钮跳转到支付宝支付</p>
  <button id="payBtn">立即支付 0.01 元</button>
</div>

<script>
const payBtn = document.getElementById('payBtn');
// 这里是你云函数里正确的地址！
const PAY_API = 'https://alipay-poclildbpd.cn-hangzhou.fcapp.run';

payBtn.addEventListener('click', async function() {
  this.disabled = true;
  this.textContent = '跳转中...';
  try {
    let response = await fetch(PAY_API, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });
    let data = await response.json();
    if (data.payUrl) {
      window.location.href = data.payUrl;
    } else {
      alert('获取支付链接失败');
    }
  } catch (err) {
    console.error(err);
    alert('支付请求出错：' + err.message);
  } finally {
    this.disabled = false;
    this.textContent = '立即支付 0.01 元';
  }
});
</script>
</body>
</html>
